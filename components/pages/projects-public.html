<section
  class="flex min-h-[calc(100vh-var(--header-offset))] scroll-mt-[var(--header-offset)] snap-start snap-always flex-col justify-center py-10 max-[1023px]:min-h-0 max-[1023px]:py-12 max-[1023px]:pb-6 max-[767px]:py-14 max-[767px]:pb-4"
  aria-labelledby="public-projects-title">
  <div class="reveal mb-6 w-full">
    <p class="mb-3 font-['Orbitron'] text-[0.78rem] uppercase tracking-[0.18em] text-[var(--lime)]">GitHub público</p>
    <h3 id="public-projects-title" class="m-0 font-['Orbitron'] text-[clamp(1.6rem,3vw,2.5rem)] leading-[1.08] text-white">Proyectos publicados y accesibles</h3>
  </div>

  <div class="reveal relative overflow-visible" data-project-carousel-root>
    <div class="mb-5 hidden items-center justify-between gap-4 max-[1023px]:flex">
      <div class="flex items-center gap-2">
        <button
          class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/5 text-lg text-cyan-100 transition-[transform,border-color,color,background-color] duration-200 hover:-translate-x-0.5 hover:border-cyan-300/45 hover:bg-cyan-300/10 hover:text-cyan-300 disabled:cursor-not-allowed disabled:opacity-35"
          type="button" data-project-prev aria-label="Proyecto anterior">
          ←
        </button>
        <button
          class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/5 text-lg text-cyan-100 transition-[transform,border-color,color,background-color] duration-200 hover:translate-x-0.5 hover:border-cyan-300/45 hover:bg-cyan-300/10 hover:text-cyan-300 disabled:cursor-not-allowed disabled:opacity-35"
          type="button" data-project-next aria-label="Proyecto siguiente">
          →
        </button>
      </div>
    </div>

    <div class="grid w-full grid-cols-1 gap-6 lg:grid-cols-2 xl:grid-cols-3 max-[1023px]:block max-[1023px]:overflow-visible"
      data-project-carousel>
      <div class="contents max-[1023px]:relative max-[1023px]:block" data-project-track>
        <div class="contents max-[1023px]:absolute max-[1023px]:inset-0 max-[1023px]:flex max-[1023px]:items-center max-[1023px]:justify-center"
          data-project-slide>
          <article class="project-card project-card--media group flex min-h-full w-full max-w-none flex-col p-5 lg:max-w-[22rem]">
            <div class="flex min-h-[4rem] flex-col gap-2.5">
              <p class="m-0 font-['Orbitron'] text-[0.72rem] uppercase tracking-[0.18em] text-[var(--lime)]">Demo</p>
              <div class="flex items-center gap-[0.9rem]">
                <span class="grid h-12 w-12 shrink-0 place-items-center overflow-hidden rounded-[0.95rem] border border-white/10 bg-[radial-gradient(circle_at_50%_30%,rgba(72,243,255,0.16),transparent_46%),rgba(8,10,22,0.92)] shadow-[inset_0_1px_0_rgba(255,255,255,0.06),0_10px_18px_rgba(0,0,0,0.18)]">
                  <img src="./assets/img/logos/alke-icon.png" alt="Ícono de Alke Wallet"
                    class="h-8 w-8 object-contain [filter:saturate(1.2)_contrast(1.1)_brightness(1.08)] transition duration-300 group-hover:scale-[1.03] group-hover:[filter:saturate(1.45)_contrast(1.16)_brightness(1.2)]">
                </span>
                <h3 class="m-0 font-['Orbitron'] text-[clamp(0.92rem,1.2vw,1.05rem)] leading-[1.08] text-cyan-300">
                  Alke Wallet Digital</h3>
              </div>
            </div>
            <div class="mt-4 flex flex-1 flex-col gap-[0.9rem]">
              <p class="m-0 min-h-[7.4rem] text-[1rem] leading-[1.6] text-[#d2c7f2]">
                Interfaz financiera moderna enfocada en experiencia visual, estructura clara y navegación fluida.
              </p>
              <div class="flex min-h-[4.7rem] items-start border-t border-white/10 pt-4">
                <small class="text-[0.88rem] leading-[1.5] text-[var(--muted)]">Desarrollo de proyecto bootcamp para Fullstack
                  JavaScript Trainee.</small>
              </div>
            </div>
            <a class="project-link project-link--public inline-flex border border-current px-3.5 py-2.5 pt-[1.1rem] font-['Orbitron'] text-[0.8rem] uppercase tracking-[0.06em] text-[#8eff83] after:content-['>']"
              href="https://maufuenb.github.io/Alke-Wallet-Digital/" target="_blank" rel="noreferrer">
              Abrir proyecto
            </a>
          </article>
        </div>
      </div>
    </div>

    <div class="mt-5 hidden items-center justify-center gap-2 max-[1023px]:flex" data-project-dots></div>
  </div>
</section>
