<header class="flex w-full flex-col gap-3 px-0 py-3 lg:flex-row lg:items-center lg:justify-between lg:gap-4 lg:py-4">

    <button

      <div class="nav-dropdown__panel" data-nav-dropdown-panel>
        <a class="nav-dropdown__link relative flex items-center justify-between gap-[0.85rem] rounded-[0.8rem] border border-white/6 bg-[linear-gradient(135deg,rgba(72,243,255,0.08),rgba(255,72,199,0.08))] px-[0.85rem] py-[0.72rem] font-['Orbitron'] text-[0.68rem] uppercase tracking-[0.12em] text-[var(--text)] transition-[color,border-color,background-color,transform,box-shadow] duration-200" href="#proyectos-publicos">Públicos</a>

      </div>
    </div>
    <a class="transition-colors duration-200 hover:text-cyan-300 focus-visible:text-cyan-300"
      href="#beyond-code">Beyond</a>
    <a class="transition-colors duration-200 hover:text-cyan-300 focus-visible:text-cyan-300"

    <a class="transition-colors duration-200 hover:text-cyan-300 focus-visible:text-cyan-300 lg:hidden"
